name: Daily Career Scout

# Triggers
on:
  schedule:
    # Runs at 08:00 UTC daily (8am London in winter; 9am London in summer/BST)
    - cron: '0 8 * * *'
  # Allows manual triggering via the 'Run workflow' button (for testing)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    # Optional: use a GitHub Environment (Settings → Environments) for secrets; else uses repo Actions secrets
    # environment: JobSniperEnvVar

    steps:
      # 1. Checkout code from repository (including the resumes folder)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Install dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run the main script
      - name: Run Job Agent
        # CRITICAL: Inject GitHub Secrets. For Groq (free): API_KEY=groq_xxx, API_BASE=https://api.groq.com/openai/v1, LLM_MODEL=llama-3.1-8b-instant
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE: ${{ secrets.API_BASE }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          RESUME_TEXT: ${{ secrets.RESUME_TEXT }}
          CRITERIA: ${{ secrets.CRITERIA }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          RESUME_FILE_ID: ${{ secrets.RESUME_FILE_ID }}
        run: python main.py